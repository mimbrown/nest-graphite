name: "Prepare flock checkout"
description: "Clone Flutter, slim gclient sync, inject Graphite + harfbuzz override, optionally patch Skia"
inputs:
  flutter_tag:
    description: "Flutter tag/branch to build"
    required: true
  platform:
    description: "Platform group: mac | ios | android | androidlinux | androidwindows | linux | windows | web"
    required: true
  graphite_ref:
    description: "silnrsi/graphite ref"
    required: true
  apply_skia_patch:
    description: "Apply the Skia unicode patch ('true'/'false')"
    required: false
    default: 'false'
  gclient_sync:
    description: "Run gclient sync ('true'/'false'). Jobs that only package existing build outputs don't need the 13 GB dependency tree."
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Free disk space
      shell: bash
      run: |
        df -h /
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/julia* \
            /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /
        fi

    # Newer Xcode images (26+) don't bundle the Metal toolchain; some runners
    # in the macos-latest pool have it, some don't. Impeller shader compilation
    # needs `metal`, so download the component when it's missing.
    - name: Ensure Metal toolchain (macOS)
      shell: bash
      run: |
        if [ "$RUNNER_OS" = "macOS" ]; then
          if xcrun -f metal >/dev/null 2>&1; then
            echo "Metal toolchain present."
          else
            echo "Metal toolchain missing; downloading..."
            sudo xcodebuild -downloadComponent MetalToolchain \
              || echo "WARNING: Metal toolchain download failed; build will fail if shaders are needed"
          fi
        fi

    - name: Clone Flutter ${{ inputs.flutter_tag }}
      shell: bash
      run: |
        git clone --depth=1 --branch "${{ inputs.flutter_tag }}" https://github.com/flutter/flutter.git flock
        echo "engine.version: $(cat flock/bin/internal/engine.version)"

    - name: Write slim .gclient
      shell: bash
      run: |
        if [ "${{ inputs.gclient_sync }}" != "true" ]; then
          echo "Skipping .gclient (gclient_sync=false)"; exit 0
        fi
        case "${{ inputs.platform }}" in
          # Android-on-Linux needs the Debian sysroot for host (clang_x64) tools,
          # which is gated behind download_linux_deps.
          androidlinux)
            LINUX_DEPS=True; ANDROID_DEPS=True; ESBUILD=False; EMSDK_LINE="" ;;
          android|androidwindows)
            LINUX_DEPS=False; ANDROID_DEPS=True; ESBUILD=False; EMSDK_LINE="" ;;
          linux)
            LINUX_DEPS=True; ANDROID_DEPS=False; ESBUILD=False; EMSDK_LINE="" ;;
          web)
            LINUX_DEPS=True; ANDROID_DEPS=False; ESBUILD=True; EMSDK_LINE='"download_emsdk": True,' ;;
          mac|ios|windows)
            LINUX_DEPS=False; ANDROID_DEPS=False; ESBUILD=False; EMSDK_LINE="" ;;
          *)
            echo "Unknown platform: ${{ inputs.platform }}"; exit 1 ;;
        esac
        cat > flock/.gclient <<EOF
        solutions = [
          {
            "custom_deps": {},
            "deps_file": "DEPS",
            "managed": False,
            "name": ".",
            "safesync_url": "",
            "url": "https://github.com/flutter/flutter.git",
            "custom_vars": {
                "download_linux_deps": $LINUX_DEPS,
                "download_android_deps": $ANDROID_DEPS,
                "download_esbuild": $ESBUILD,
                "download_fuchsia_deps": False,
                $EMSDK_LINE
            }
          },
        ]
        EOF

    - name: Set up depot_tools
      shell: bash
      run: |
        if [ "${{ inputs.gclient_sync }}" != "true" ]; then
          echo "Skipping depot_tools (gclient_sync=false)"; exit 0
        fi
        git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
        echo "$HOME/depot_tools" >> "$GITHUB_PATH"

    - name: gclient sync
      shell: bash
      env:
        DEPOT_TOOLS_UPDATE: '0'
      run: |
        if [ "${{ inputs.gclient_sync }}" != "true" ]; then
          echo "Skipping gclient sync (gclient_sync=false)"; exit 0
        fi
        cd flock
        gclient sync -D --no-history -j8
        du -sh "$GITHUB_WORKSPACE/flock" || true
        df -h /

    # Graphite injection happens AFTER gclient sync so the DEPS-managed
    # harfbuzz checkout can't clobber the override. The BUILD.gn is generated
    # from the stock one in the checkout (not a static snapshot), so it tracks
    # upstream harfbuzz source-list changes across Flutter versions.
    - name: Inject Graphite + harfbuzz override
      shell: bash
      run: |
        git clone https://github.com/silnrsi/graphite flock/engine/src/flutter/third_party/graphite
        git -C flock/engine/src/flutter/third_party/graphite checkout "${{ inputs.graphite_ref }}"
        python3 patch-flutter/scripts/graphite_harfbuzz_buildgn.py flock

    # The unicode patch targets Skia sources, so it applies inside the
    # Skia checkout (only exists after sync).
    - name: Apply Skia unicode patch
      shell: bash
      run: |
        if [ ! -d flock/engine/src/flutter/third_party/skia ]; then
          echo "Skia checkout absent (no gclient sync) — skipping patch"; exit 0
        fi
        if [ "${{ inputs.apply_skia_patch }}" = "true" ]; then
          git -C flock/engine/src/flutter/third_party/skia apply -v \
            "$GITHUB_WORKSPACE/patch-flutter/patches/unicode-0600-0603-fix.patch"
        else
          echo "Skipping Skia patch (apply_skia_patch=${{ inputs.apply_skia_patch }})"
        fi
