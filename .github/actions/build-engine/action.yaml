name: "Build Flutter Engine Configuration"
description: "Build a single Flutter engine configuration using build_engine.sh"
inputs:
  config_name:
    description: "Flutter Engine Tool config name (e.g., ci/mac_debug_arm64, ci/ios_debug)"
    required: true

  gcp_bucket:
    description: "GCP bucket for artifact uploads (optional)"
    required: false
    default: ''

  gcp_credentials:
    description: "GCP service account credentials base64 (optional)"
    required: false
    default: ''

  apply_patches:
    description: "Set to true to apply patches"
    required: false
    default: 'false'

  patches:
    description: "Comma-separated patch filenames"
    required: false
    default: 'add_slim_gclients.patch'

  flutter_tag:
    description: "Optional Flutter tag to checkout"
    required: false
    default: ''
  framework:
    description: "Set to true to create frameworks instead of per-config build"
    required: false
    default: 'false'

  platform:
    description: "Platform name for framework creation (mac or ios)"
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    # The heavy preparation (checkout, download Flutter, apply patches, gclient sync)
    # is run once in the workflow `prepare` job and the prepared `flock` tree is
    # provided to each matrix job as an artifact. This composite action assumes
    # the workspace already contains the prepared `flock` checkout and starts
    # with the cloud SDK/auth and GCS check.
    
    - name: Set up Cloud SDK
      if: ${{ inputs.gcp_bucket != '' }}
      uses: google-github-actions/setup-gcloud@v2
      with:
        version: '>= 363.0.0'

    - name: Authenticate gcloud
      if: ${{ inputs.gcp_bucket != '' && inputs.gcp_credentials != '' }}
      shell: bash
      env:
        GCP_CREDENTIALS: ${{ inputs.gcp_credentials }}
      run: |
        echo "$GCP_CREDENTIALS" | base64 -d > "$HOME"/gcloud.json
        gcloud auth activate-service-account --key-file="$HOME"/gcloud.json

    - name: Check engine.version in GCS
      if: ${{ inputs.gcp_bucket != '' }}
      shell: bash
      run: |
        # Ensure engine.version exists in the checkout
        if [ ! -f flock/bin/internal/engine.version ]; then
          echo "flock/bin/internal/engine.version not found; continuing to build"
        else
          ENGINE_VERSION_FILE="flock/bin/internal/engine.version"
          ENGINE_VERSION_CONTENT=$(cat "$ENGINE_VERSION_FILE")
          echo "Discovered engine.version: $ENGINE_VERSION_CONTENT"
          # Check if engine.stamp already exists in the target GCS path
          if gcloud storage ls "gs://${{ inputs.gcp_bucket }}/flutter_infra_release/flutter/${ENGINE_VERSION_CONTENT}/engine.stamp" >/dev/null 2>&1; then
            echo "Engine ${ENGINE_VERSION_CONTENT} already present in bucket; skipping build."
            exit 0
          else
            echo "Engine ${ENGINE_VERSION_CONTENT} not found in bucket; proceeding with build."
          fi
        fi

    - name: Build ${{ inputs.config_name }}
      shell: bash
      run: |
        chmod +x "$GITHUB_WORKSPACE/local-build-tools/build_engine.sh"
        cd "$GITHUB_WORKSPACE"
        if [ "${{ inputs.framework }}" = "true" ]; then
          # Create frameworks for specified platform
          if [ -z "${{ inputs.platform }}" ]; then
            echo "inputs.platform is required when framework=true"
            exit 1
          fi
          ./local-build-tools/build_engine.sh --framework --platform "${{ inputs.platform }}"
        else
          ./local-build-tools/build_engine.sh build --config "${{ inputs.config_name }}"
        fi

    - name: Upload artifacts and engine stamp
      if: ${{ inputs.gcp_bucket != '' }}
      shell: bash
      run: |
        cd flock/engine/src
        # Prefer the engine.version file contents for the engine identifier.
        if [ -f ../bin/internal/engine.version ]; then
          ENGINE_ID=$(cat ../bin/internal/engine.version)
        else
          ENGINE_ID=$(git rev-parse HEAD)
        fi
        echo "Using engine id: $ENGINE_ID"
        for output_dir in out/*/; do
          config_name=$(basename "$output_dir")
          if [[ ! "$config_name" =~ "test" ]]; then
            tar c "$output_dir" 2>/dev/null | gzip > "out/${config_name}.tar.gz" 2>/dev/null || true
            gcloud storage cp "out/${config_name}.tar.gz" "gs://${{ inputs.gcp_bucket }}/flutter_infra_release/flutter/${ENGINE_ID}/${config_name}.tar.gz" 2>/dev/null || true
          fi
        done

        # Create and upload engine.stamp matching engine.version content
        if [ -f ../bin/internal/engine.version ]; then
          ENGINE_STAMP_CONTENT=$(cat ../bin/internal/engine.version)
          echo "$ENGINE_STAMP_CONTENT" > out/engine.stamp
          gcloud storage cp out/engine.stamp "gs://${{ inputs.gcp_bucket }}/flutter_infra_release/flutter/${ENGINE_STAMP_CONTENT}/engine.stamp" 2>/dev/null || true
          echo "Uploaded engine.stamp for ${ENGINE_STAMP_CONTENT}"
        else
          echo "No ../bin/internal/engine.version available to create engine.stamp"
        fi
