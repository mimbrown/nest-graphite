name: Pilot Engine Build (single config)

# Builds ONE engine config end-to-end on a single runner:
# clone Flutter -> slim gclient sync -> inject Graphite + harfbuzz override
# -> patch Skia -> et/ninja build -> package -> upload as an Actions artifact.
#
# Purpose: validate that a Graphite-enabled engine build fits on free
# GitHub-hosted runners (disk, RAM, 6h job limit) before scaling to a matrix.

on:
  workflow_dispatch:
    inputs:
      flutter_tag:
        description: 'Flutter tag/branch to build'
        required: true
        default: '3.44.4'
      config:
        description: 'Engine config (as passed to et build --config)'
        required: true
        default: 'ci/android_release_arm64'
      platform:
        description: 'Platform group: mac | ios | android | androidlinux | linux | web'
        required: true
        default: 'androidlinux'
      apply_skia_patch:
        description: 'Apply the Skia unicode patch (file in repo is currently truncated)'
        required: false
        default: 'false'
      graphite_ref:
        description: 'silnrsi/graphite ref to build against'
        required: false
        default: 'ca8d821e60a15b6c24e404c9086992c975d8e1cf'

env:
  FLUTTER_TAG: ${{ github.event.inputs.flutter_tag }}
  CONFIG: ${{ github.event.inputs.config }}
  PLATFORM: ${{ github.event.inputs.platform }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Checkout nest-graphite
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          # The engine checkout doesn't use any of these preinstalled toolchains.
          # gclient downloads its own Android SDK/NDK, so the preinstalled one goes too.
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/julia* \
            /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Clone Flutter ${{ env.FLUTTER_TAG }}
        run: |
          git clone --depth=1 --branch "$FLUTTER_TAG" https://github.com/flutter/flutter.git flock
          echo "engine.version: $(cat flock/bin/internal/engine.version)"

      - name: Write slim .gclient
        run: |
          case "$PLATFORM" in
            # Android-on-Linux needs the Debian sysroot for host (clang_x64) tools,
            # which is gated behind download_linux_deps.
            androidlinux)
              LINUX_DEPS=True; ANDROID_DEPS=True; ESBUILD=False; EMSDK_LINE="" ;;
            android)
              LINUX_DEPS=False; ANDROID_DEPS=True; ESBUILD=False; EMSDK_LINE="" ;;
            linux)
              LINUX_DEPS=True; ANDROID_DEPS=False; ESBUILD=False; EMSDK_LINE="" ;;
            web)
              LINUX_DEPS=True; ANDROID_DEPS=False; ESBUILD=True; EMSDK_LINE='"download_emsdk": True,' ;;
            mac|ios)
              LINUX_DEPS=False; ANDROID_DEPS=False; ESBUILD=False; EMSDK_LINE="" ;;
            *)
              echo "Unknown platform: $PLATFORM"; exit 1 ;;
          esac
          cat > flock/.gclient <<EOF
          solutions = [
            {
              "custom_deps": {},
              "deps_file": "DEPS",
              "managed": False,
              "name": ".",
              "safesync_url": "",
              "url": "https://github.com/flutter/flutter.git",
              "custom_vars": {
                  "download_linux_deps": $LINUX_DEPS,
                  "download_android_deps": $ANDROID_DEPS,
                  "download_esbuild": $ESBUILD,
                  "download_fuchsia_deps": False,
                  $EMSDK_LINE
              }
            },
          ]
          EOF
          cat flock/.gclient

      - name: Set up depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
          echo "$HOME/depot_tools" >> "$GITHUB_PATH"

      - name: gclient sync
        env:
          DEPOT_TOOLS_UPDATE: '0'
        run: |
          cd flock
          gclient sync -D --no-history -j8
          echo "=== Checkout size ==="
          du -sh "$GITHUB_WORKSPACE/flock" || true
          df -h /

      # Graphite injection happens AFTER gclient sync, because sync manages
      # third_party/harfbuzz and would clobber anything placed there earlier.
      - name: Inject Graphite + harfbuzz override
        run: |
          git clone https://github.com/silnrsi/graphite flock/engine/src/flutter/third_party/graphite
          git -C flock/engine/src/flutter/third_party/graphite checkout "${{ github.event.inputs.graphite_ref }}"
          cp patch-flutter/overrides/harfbuzz/BUILD.gn flock/engine/src/flutter/third_party/harfbuzz/BUILD.gn

      # The unicode patch targets Skia sources (modules/skparagraph, modules/skunicode),
      # so it must be applied inside the Skia checkout, which only exists after sync.
      - name: Apply Skia unicode patch
        if: ${{ github.event.inputs.apply_skia_patch == 'true' }}
        run: |
          git -C flock/engine/src/flutter/third_party/skia apply -v \
            "$GITHUB_WORKSPACE/patch-flutter/patches/unicode-0600-0603-fix.patch"

      - name: Build ${{ env.CONFIG }}
        run: |
          chmod +x local-build-tools/build_engine.sh
          ./local-build-tools/build_engine.sh build --platform "$PLATFORM" --config "$CONFIG" --verbose

      - name: Verify Graphite made it into the engine
        run: |
          OUT="flock/engine/src/out/$CONFIG"
          found=0
          for so in "$OUT"/libflutter.so "$OUT"/so.unstripped/libflutter.so "$OUT"/lib.unstripped/libflutter.so; do
            if [ -f "$so" ]; then
              hits=$(strings -a "$so" | grep -c graphite || true)
              echo "$so: $hits graphite string(s)"
              if [ "${hits:-0}" -gt 0 ]; then found=1; fi
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "WARNING: no graphite strings found in engine binaries (or no .so in this config)."
            echo "Contents of $OUT:"
            ls -la "$OUT" || true
          fi

      - name: Report build outputs and disk
        if: always()
        run: |
          df -h /
          echo "=== out/ ==="
          du -sh flock/engine/src/out/* 2>/dev/null || true
          echo "=== packaged artifacts ==="
          find flock/engine/src/out/flutter_infra_release -type f 2>/dev/null | head -50 || true
          find flock/engine/src/out/download.flutter.io -type f 2>/dev/null | head -50 || true

      - name: Sanitize config name for artifact
        if: always()
        run: echo "CONFIG_SAFE=${CONFIG//\//_}" >> "$GITHUB_ENV"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pilot-${{ env.CONFIG_SAFE }}
          if-no-files-found: warn
          path: |
            flock/engine/src/out/flutter_infra_release/
            flock/engine/src/out/download.flutter.io/
