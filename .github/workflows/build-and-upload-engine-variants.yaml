  build-engine-mac:
    # We'll run on whatever OS the matrix entry specifies.
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    strategy:
      max-parallel: 4
      matrix:
        include:

         # ------------------------- MAC BUILDS -------------------------

