name: Build Flutter Engines (Parallel Matrix)

on:
  workflow_dispatch:
    inputs:
      flutter_tag:
        description: 'Optional Flutter tag to build (defaults to latest release)'
        required: false
      apply_patches:
        description: 'Set to true to apply patches'
        required: false
        default: 'true'
      patches:
        description: 'Comma-separated patch names (e.g., add_slim_gclients.patch,unicode-0600-0603-fix.patch)'
        required: false
        # By default only the unicode fix is applied; add_slim_gclients.patch is applied by CI always.
        default: 'unicode-0600-0603-fix.patch'
      gcp_bucket:
        description: 'GCP bucket for artifacts (optional)'
        required: false
      gcp_credentials_base64:
        description: 'GCP credentials base64 (optional)'
        required: false
  schedule:
    - cron: '0 4 * * *'

jobs:
  prepare-linux-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and prepare Flutter
        shell: bash
        run: |
          chmod +x patch-flutter/scripts/download_and_prepare_flutter.sh
          patch-flutter/scripts/download_and_prepare_flutter.sh "${{ github.event.inputs.flutter_tag || '' }}"

      - name: Always apply add_slim_gclients.patch
        shell: bash
        run: |
          set -e
          if [ -f patch-flutter/patches/add_slim_gclients.patch ]; then
            (cd flock && git apply --index ../patch-flutter/patches/add_slim_gclients.patch) || true
          fi

      - name: Optionally apply other patches (unicode by default)
        if: ${{ github.event.inputs.apply_patches == 'true' }}
        shell: bash
        run: |
          set -e
          if [ -n "${{ github.event.inputs.patches }}" ]; then
            IFS=','; for p in ${{ github.event.inputs.patches }}; do
              p_trimmed=$(echo "$p" | xargs)
              if [ -f "patch-flutter/patches/$p_trimmed" ]; then
                (cd flock && git apply --index "../patch-flutter/patches/$p_trimmed") || true
              fi
            done
          fi

      - name: Copy slim gclient for linux-android
        shell: bash
        run: |
          cp engine/scripts/slim-linux-android.gclient flock/.gclient

      - name: Clone graphite into third_party
        shell: bash
        run: |
          git clone https://github.com/silnrsi/graphite flock/engine/src/flutter/third_party/graphite || true

      - name: Replace harfbuzz BUILD.gn with provided override
        shell: bash
        run: |
          mkdir -p flock/engine/src/flutter/third_party/harfbuzz
          cp patch-flutter/overrides/harfbuzz/BUILD.gn flock/engine/src/flutter/third_party/harfbuzz/BUILD.gn

      - name: Set up depot_tools and gclient
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
          echo "$HOME/depot_tools" >> "$GITHUB_PATH"

      - name: Gclient sync
        shell: bash
        run: |
          cd flock
          gclient sync -D

      - name: Upload prepared flock (linux-android)
        uses: actions/upload-artifact@v4
        with:
          name: prepared-flock-linux-android
          path: flock

  prepare-linux-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and prepare Flutter
        shell: bash
        run: |
          chmod +x patch-flutter/scripts/download_and_prepare_flutter.sh
          patch-flutter/scripts/download_and_prepare_flutter.sh "${{ github.event.inputs.flutter_tag || '' }}"

      - name: Always apply add_slim_gclients.patch
        shell: bash
        run: |
          set -e
          if [ -f patch-flutter/patches/add_slim_gclients.patch ]; then
            (cd flock && git apply --index ../patch-flutter/patches/add_slim_gclients.patch) || true
          fi

      - name: Optionally apply other patches (unicode by default)
        if: ${{ github.event.inputs.apply_patches == 'true' }}
        shell: bash
        run: |
          set -e
          if [ -n "${{ github.event.inputs.patches }}" ]; then
            IFS=','; for p in ${{ github.event.inputs.patches }}; do
              p_trimmed=$(echo "$p" | xargs)
              if [ -f "patch-flutter/patches/$p_trimmed" ]; then
                (cd flock && git apply --index "../patch-flutter/patches/$p_trimmed") || true
              fi
            done
          fi

      - name: Copy slim gclient for linux-web
        shell: bash
        run: |
          cp engine/scripts/slim-linux-web.gclient flock/.gclient

      - name: Clone graphite into third_party
        shell: bash
        run: |
          git clone https://github.com/silnrsi/graphite flock/engine/src/flutter/third_party/graphite || true

      - name: Replace harfbuzz BUILD.gn with provided override
        shell: bash
        run: |
          mkdir -p flock/engine/src/flutter/third_party/harfbuzz
          cp patch-flutter/overrides/harfbuzz/BUILD.gn flock/engine/src/flutter/third_party/harfbuzz/BUILD.gn

      - name: Set up depot_tools and gclient
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
          echo "$HOME/depot_tools" >> "$GITHUB_PATH"

      - name: Gclient sync
        shell: bash
        run: |
          cd flock
          gclient sync -D

      - name: Upload prepared flock (linux-web)
        uses: actions/upload-artifact@v4
        with:
          name: prepared-flock-linux-web
          path: flock

  prepare-linux-desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and prepare Flutter
        shell: bash
        run: |
          chmod +x patch-flutter/scripts/download_and_prepare_flutter.sh
          patch-flutter/scripts/download_and_prepare_flutter.sh "${{ github.event.inputs.flutter_tag || '' }}"

      - name: Always apply add_slim_gclients.patch
        shell: bash
        run: |
          set -e
          if [ -f patch-flutter/patches/add_slim_gclients.patch ]; then
            (cd flock && git apply --index ../patch-flutter/patches/add_slim_gclients.patch) || true
          fi

      - name: Optionally apply other patches (unicode by default)
        if: ${{ github.event.inputs.apply_patches == 'true' }}
        shell: bash
        run: |
          set -e
          if [ -n "${{ github.event.inputs.patches }}" ]; then
            IFS=','; for p in ${{ github.event.inputs.patches }}; do
              p_trimmed=$(echo "$p" | xargs)
              if [ -f "patch-flutter/patches/$p_trimmed" ]; then
                (cd flock && git apply --index "../patch-flutter/patches/$p_trimmed") || true
              fi
            done
          fi

      - name: Copy slim gclient for linux-desktop
        shell: bash
        run: |
          cp engine/scripts/slim-linux-desktop.gclient flock/.gclient

      - name: Clone graphite into third_party
        shell: bash
        run: |
          git clone https://github.com/silnrsi/graphite flock/engine/src/flutter/third_party/graphite || true

      - name: Replace harfbuzz BUILD.gn with provided override
        shell: bash
        run: |
          mkdir -p flock/engine/src/flutter/third_party/harfbuzz
          cp patch-flutter/overrides/harfbuzz/BUILD.gn flock/engine/src/flutter/third_party/harfbuzz/BUILD.gn

      - name: Set up depot_tools and gclient
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
          echo "$HOME/depot_tools" >> "$GITHUB_PATH"

      - name: Gclient sync
        shell: bash
        run: |
          cd flock
          gclient sync -D

      - name: Upload prepared flock (linux-desktop)
        uses: actions/upload-artifact@v4
        with:
          name: prepared-flock-linux-desktop
          path: flock

  prepare-macos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and prepare Flutter
        shell: bash
        run: |
          chmod +x patch-flutter/scripts/download_and_prepare_flutter.sh
          patch-flutter/scripts/download_and_prepare_flutter.sh "${{ github.event.inputs.flutter_tag || '' }}"

      - name: Always apply add_slim_gclients.patch
        shell: bash
        run: |
          set -e
          if [ -f patch-flutter/patches/add_slim_gclients.patch ]; then
            (cd flock && git apply --index ../patch-flutter/patches/add_slim_gclients.patch) || true
          fi

      - name: Optionally apply other patches (unicode by default)
        if: ${{ github.event.inputs.apply_patches == 'true' }}
        shell: bash
        run: |
          set -e
          if [ -n "${{ github.event.inputs.patches }}" ]; then
            IFS=','; for p in ${{ github.event.inputs.patches }}; do
              p_trimmed=$(echo "$p" | xargs)
              if [ -f "patch-flutter/patches/$p_trimmed" ]; then
                (cd flock && git apply --index "../patch-flutter/patches/$p_trimmed") || true
              fi
            done
          fi

      - name: Copy slim gclient for mac
        shell: bash
        run: |
          cp engine/scripts/slim-mac.gclient flock/.gclient

      - name: Clone graphite into third_party
        shell: bash
        run: |
          git clone https://github.com/silnrsi/graphite flock/engine/src/flutter/third_party/graphite || true

      - name: Replace harfbuzz BUILD.gn with provided override
        shell: bash
        run: |
          mkdir -p flock/engine/src/flutter/third_party/harfbuzz
          cp patch-flutter/overrides/harfbuzz/BUILD.gn flock/engine/src/flutter/third_party/harfbuzz/BUILD.gn

      - name: Set up depot_tools and gclient
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
          echo "$HOME/depot_tools" >> "$GITHUB_PATH"

      - name: Gclient sync
        shell: bash
        run: |
          cd flock
          gclient sync -D

      - name: Upload prepared flock (macos)
        uses: actions/upload-artifact@v4
        with:
          name: prepared-flock-macos
          path: flock

  # macOS configurations
  build-mac:
    needs: prepare-macos
    runs-on: macos-latest
    strategy:
      max-parallel: 4
      matrix:
        include:
          - name: mac debug arm64
            config: ci/mac_debug_arm64
          - name: mac debug framework arm64
            config: ci/mac_debug_framework_arm64
          - name: mac debug gen snapshot arm64
            config: ci/mac_debug_gen_snapshot_arm64
          - name: mac profile arm64
            config: ci/mac_profile_arm64
          - name: mac profile framework arm64
            config: ci/mac_profile_framework_arm64
          - name: mac profile gen snapshot arm64
            config: ci/mac_profile_gen_snapshot_arm64
          - name: mac release arm64
            config: ci/mac_release_arm64
          - name: mac release framework arm64
            config: ci/mac_release_framework_arm64
          - name: mac release gen snapshot arm64
            config: ci/mac_release_gen_snapshot_arm64
          - name: mac host debug
            config: ci/host_debug
          - name: mac host debug clang tidy
            config: ci/host_debug_clang_tidy
          - name: mac host debug framework
            config: ci/host_debug_framework
          - name: mac host debug gen snapshot
            config: ci/host_debug_gen_snapshot
          - name: mac host debug unopt arm64
            config: ci/host_debug_unopt_arm64
          - name: mac host profile
            config: ci/host_profile
          - name: mac host profile framework
            config: ci/host_profile_framework
          - name: mac host profile gen snapshot
            config: ci/host_profile_gen_snapshot
          - name: mac host release
            config: ci/host_release
          - name: mac host release arm64 licenses
            config: ci/host_release_arm64_licenses
          - name: mac host release framework
            config: ci/host_release_framework
          - name: mac host release gen snapshot
            config: ci/host_release_gen_snapshot
    steps:
      - name: Download prepared flock (macos)
        uses: actions/download-artifact@v4
        with:
          name: prepared-flock-macos
          path: .

      - name: Build ${{ matrix.name }}
        uses: ./.github/actions/build-engine
        with:
          config_name: ${{ matrix.config }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_credentials: ${{ github.event.inputs.gcp_credentials_base64 }}
          apply_patches: ${{ github.event.inputs.apply_patches }}
          patches: ${{ github.event.inputs.patches }}
          flutter_tag: ${{ github.event.inputs.flutter_tag || '' }}

  # iOS configurations
  build-ios:
    needs: prepare-macos
    runs-on: macos-latest
    strategy:
      max-parallel: 4
      matrix:
        include:
          - name: ios debug
            config: ci/ios_debug
          - name: ios debug sim
            config: ci/ios_debug_sim
          - name: ios debug sim arm64
            config: ci/ios_debug_sim_arm64
          - name: ios profile
            config: ci/ios_profile
          - name: ios release
            config: ci/ios_release
          - name: ios debug extension safe
            config: ci/ios_debug_extension_safe
          - name: ios debug sim arm64 extension safe
            config: ci/ios_debug_sim_arm64_extension_safe
          - name: ios debug sim extension safe
            config: ci/ios_debug_sim_extension_safe
          - name: ios debug unopt sim arm64 extension safe
            config: ci/ios_debug_unopt_sim_arm64_extension_safe
          - name: ios profile extension safe
            config: ci/ios_profile_extension_safe
          - name: ios release extension safe
            config: ci/ios_release_extension_safe
    steps:
      - name: Download prepared flock (macos)
        uses: actions/download-artifact@v4
        with:
          name: prepared-flock-macos
          path: .

      - name: Build ${{ matrix.name }}
        uses: ./.github/actions/build-engine
        with:
          config_name: ${{ matrix.config }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_credentials: ${{ github.event.inputs.gcp_credentials_base64 }}
          apply_patches: ${{ github.event.inputs.apply_patches }}
          patches: ${{ github.event.inputs.patches }}
          flutter_tag: ${{ github.event.inputs.flutter_tag || '' }}

  # Android on macOS
  build-android-mac:
    needs: prepare-macos
    runs-on: macos-latest
    strategy:
      max-parallel: 4
      matrix:
        include:
          - name: android debug arm64
            config: android_debug_arm64
          - name: android debug unopt
            config: android_debug_unopt
          - name: android debug unopt arm64
            config: android_debug_unopt_arm64
          - name: android profile
            config: ci/android_profile
          - name: android profile arm64
            config: ci/android_profile_arm64
          - name: android profile x64
            config: ci/android_profile_x64
          - name: android release
            config: ci/android_release
          - name: android release arm64
            config: ci/android_release_arm64
          - name: android release x64
            config: ci/android_release_x64
    steps:
      - name: Download prepared flock (macos)
        uses: actions/download-artifact@v4
        with:
          name: prepared-flock-macos
          path: .

      - name: Build ${{ matrix.name }}
        uses: ./.github/actions/build-engine
        with:
          config_name: ${{ matrix.config }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_credentials: ${{ github.event.inputs.gcp_credentials_base64 }}
          apply_patches: ${{ github.event.inputs.apply_patches }}
          patches: ${{ github.event.inputs.patches }}
          flutter_tag: ${{ github.event.inputs.flutter_tag || '' }}

  # Android on Linux
  build-android-linux:
    needs: prepare-linux-android
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        include:
          - name: android debug unopt arm64
            config: android_debug_unopt_arm64
          - name: android debug unopt x64
            config: android_debug_unopt_x64
          - name: android debug
            config: ci/android_debug
          - name: android debug unopt
            config: ci/android_debug_unopt
          - name: android debug arm64
            config: ci/android_debug_arm64
          - name: android debug x64
            config: ci/android_debug_x64
          - name: android debug x86
            config: ci/android_debug_x86
          - name: android embedder debug unopt
            config: ci/android_embedder_debug_unopt
          - name: android emulator debug x64
            config: ci/android_emulator_debug_x64
          - name: android profile
            config: ci/android_profile
          - name: android profile arm64
            config: ci/android_profile_arm64
          - name: android profile x64
            config: ci/android_profile_x64
          - name: android release
            config: ci/android_release
          - name: android release arm64
            config: ci/android_release_arm64
          - name: android release x64
            config: ci/android_release_x64
    steps:
      - name: Download prepared flock (linux-android)
        uses: actions/download-artifact@v4
        with:
          name: prepared-flock-linux-android
          path: .

      - name: Build ${{ matrix.name }}
        uses: ./.github/actions/build-engine
        with:
          config_name: ${{ matrix.config }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_credentials: ${{ github.event.inputs.gcp_credentials_base64 }}
          apply_patches: ${{ github.event.inputs.apply_patches }}
          patches: ${{ github.event.inputs.patches }}
          flutter_tag: ${{ github.event.inputs.flutter_tag || '' }}

  # Linux configurations
  build-linux:
    needs: prepare-linux-desktop
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        include:
          - name: linux debug arm64
            config: ci/linux_debug_arm64
          - name: linux profile arm64
            config: ci/linux_profile_arm64
          - name: linux release arm64
            config: ci/linux_release_arm64
          - name: linux host debug
            config: ci/host_debug
          - name: linux host debug clang tidy
            config: ci/host_debug_clang_tidy
          - name: linux host debug desktop
            config: ci/host_debug_desktop
          - name: linux host debug unopt
            config: ci/host_debug_unopt
          - name: linux host release
            config: ci/host_release
          - name: linux host release desktop
            config: ci/host_release_desktop
          - name: linux host release licenses
            config: ci/host_release_licenses
    steps:
      - name: Download prepared flock (linux-desktop)
        uses: actions/download-artifact@v4
        with:
          name: prepared-flock-linux-desktop
          path: .

      - name: Build ${{ matrix.name }}
        uses: ./.github/actions/build-engine
        with:
          config_name: ${{ matrix.config }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_credentials: ${{ github.event.inputs.gcp_credentials_base64 }}
          apply_patches: ${{ github.event.inputs.apply_patches }}
          patches: ${{ github.event.inputs.patches }}
          flutter_tag: ${{ github.event.inputs.flutter_tag || '' }}

  # Web/WASM configurations
  build-web:
    needs: prepare-linux-web
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        include:
          - name: web wasm debug unopt
            config: wasm_debug_unopt
          - name: web wasm release
            config: wasm_release
    steps:
      - name: Download prepared flock (linux-web)
        uses: actions/download-artifact@v4
        with:
          name: prepared-flock-linux-web
          path: .

      - name: Build ${{ matrix.name }}
        uses: ./.github/actions/build-engine
        with:
          config_name: ${{ matrix.config }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_credentials: ${{ github.event.inputs.gcp_credentials_base64 }}
          apply_patches: ${{ github.event.inputs.apply_patches }}
          patches: ${{ github.event.inputs.patches }}
          flutter_tag: ${{ github.event.inputs.flutter_tag || '' }}

  # Create macOS frameworks (depends on all macOS and iOS builds)
  create-mac-frameworks:
    needs: [prepare-macos, build-mac, build-ios, build-android-mac]
    runs-on: macos-latest
    steps:
      - name: Download prepared flock (macos)
        uses: actions/download-artifact@v4
        with:
          name: prepared-flock-macos
          path: .

      - name: Create macOS frameworks
        uses: ./.github/actions/build-engine
        with:
          framework: 'true'
          platform: 'mac'
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_credentials: ${{ github.event.inputs.gcp_credentials_base64 }}
          apply_patches: ${{ github.event.inputs.apply_patches }}
          patches: ${{ github.event.inputs.patches }}
          flutter_tag: ${{ github.event.inputs.flutter_tag || '' }}

      - name: Create iOS frameworks
        uses: ./.github/actions/build-engine
        with:
          framework: 'true'
          platform: 'ios'
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_credentials: ${{ github.event.inputs.gcp_credentials_base64 }}
          apply_patches: ${{ github.event.inputs.apply_patches }}
          patches: ${{ github.event.inputs.patches }}
          flutter_tag: ${{ github.event.inputs.flutter_tag || '' }}
