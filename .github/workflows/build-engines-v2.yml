name: Build Engines v2

# Builds the Graphite-enabled engine artifact set that production consumes
# (derived from the gs://flutter-graphite-builds manifest):
#   - Linux job:  Android artifacts.zip / symbols / embedder / AARs
#   - Mac jobs:   iOS + macOS configs, android gen_snapshot hosts (darwin-x64.zip)
#   - Frameworks: assembles FlutterMacOS/Flutter xcframeworks + gen_snapshots
#                 from tarred out-dirs (tar preserves exec bits across jobs)
#   - Backfill:   stock upstream artifacts that don't need Graphite
#
# Each job prepares its own checkout (slim gclient sync is ~2 min on these
# runners) — no giant prepared-tree artifact handoffs.
#
# GCS upload requires the GCP_SA_KEY repo secret and upload_gcs=true.

on:
  workflow_dispatch:
    inputs:
      flutter_tag:
        description: 'Flutter tag/branch to build'
        required: true
        default: '3.44.4'
      scope:
        description: 'smoke (iOS debug set + frameworks) or full (everything)'
        required: true
        default: 'smoke'
      apply_skia_patch:
        description: 'Apply the Skia unicode patch'
        required: false
        default: 'true'
      upload_gcs:
        description: 'Upload to GCS (requires GCP_SA_KEY secret)'
        required: false
        default: 'false'
      gcp_bucket:
        description: 'GCS bucket name'
        required: false
        default: 'flutter-graphite-builds'
      graphite_ref:
        description: 'silnrsi/graphite ref to build against'
        required: false
        default: 'ca8d821e60a15b6c24e404c9086992c975d8e1cf'
      frameworks_from_run:
        description: 'Recovery mode: skip builds, assemble frameworks from this run ID''s outdir artifacts'
        required: false
        default: ''
      recovery_build_configs:
        description: 'Recovery mode: JSON matrix entries to additionally build in this run (merged over frameworks_from_run artifacts)'
        required: false
        default: '[]'

env:
  FLUTTER_TAG: ${{ github.event.inputs.flutter_tag }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      linux_matrix: ${{ steps.m.outputs.linux }}
      mac_matrix: ${{ steps.m.outputs.mac }}
    steps:
      - id: m
        run: |
          if [ -n "${{ github.event.inputs.frameworks_from_run }}" ]; then
            # Recovery mode: frameworks pulls artifacts from the given run;
            # optionally build a few missing configs in this run too.
            echo "linux=[]" >> "$GITHUB_OUTPUT"
            echo "mac=$(echo '${{ github.event.inputs.recovery_build_configs }}' | tr -d '\n ')" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event.inputs.scope }}" = "full" ]; then
            linux='[
              {"config":"ci/android_debug","platform":"androidlinux"},
              {"config":"ci/android_debug_arm64","platform":"androidlinux"},
              {"config":"ci/android_debug_x64","platform":"androidlinux"},
              {"config":"ci/android_profile","platform":"androidlinux"},
              {"config":"ci/android_profile_arm64","platform":"androidlinux"},
              {"config":"ci/android_profile_x64","platform":"androidlinux"},
              {"config":"ci/android_release","platform":"androidlinux"},
              {"config":"ci/android_release_arm64","platform":"androidlinux"},
              {"config":"ci/android_release_x64","platform":"androidlinux"}
            ]'
            mac='[
              {"config":"ci/ios_debug","platform":"ios","save_out":true},
              {"config":"ci/ios_debug_sim","platform":"ios","save_out":true},
              {"config":"ci/ios_debug_sim_arm64","platform":"ios","save_out":true},
              {"config":"ci/ios_profile","platform":"ios","save_out":true},
              {"config":"ci/ios_release","platform":"ios","save_out":true},
              {"config":"ci/ios_debug_extension_safe","platform":"ios","save_out":true},
              {"config":"ci/ios_debug_sim_extension_safe","platform":"ios","save_out":true},
              {"config":"ci/ios_debug_sim_arm64_extension_safe","platform":"ios","save_out":true},
              {"config":"ci/ios_profile_extension_safe","platform":"ios","save_out":true},
              {"config":"ci/ios_release_extension_safe","platform":"ios","save_out":true},
              {"config":"ci/mac_debug_arm64","platform":"mac","save_out":false},
              {"config":"ci/mac_debug_framework_arm64","platform":"mac","save_out":true},
              {"config":"ci/mac_debug_gen_snapshot_arm64","platform":"mac","save_out":true},
              {"config":"ci/mac_profile_arm64","platform":"mac","save_out":false},
              {"config":"ci/mac_profile_framework_arm64","platform":"mac","save_out":true},
              {"config":"ci/mac_profile_gen_snapshot_arm64","platform":"mac","save_out":true},
              {"config":"ci/mac_release_arm64","platform":"mac","save_out":false},
              {"config":"ci/mac_release_framework_arm64","platform":"mac","save_out":true},
              {"config":"ci/mac_release_gen_snapshot_arm64","platform":"mac","save_out":true},
              {"config":"ci/host_debug","platform":"mac","save_out":false},
              {"config":"ci/host_debug_framework","platform":"mac","save_out":true},
              {"config":"ci/host_debug_gen_snapshot","platform":"mac","save_out":true},
              {"config":"ci/host_profile","platform":"mac","save_out":false},
              {"config":"ci/host_profile_framework","platform":"mac","save_out":true},
              {"config":"ci/host_profile_gen_snapshot","platform":"mac","save_out":true},
              {"config":"ci/host_release","platform":"mac","save_out":false},
              {"config":"ci/host_release_framework","platform":"mac","save_out":true},
              {"config":"ci/host_release_gen_snapshot","platform":"mac","save_out":true},
              {"config":"android_debug_arm64","platform":"android","save_out":false},
              {"config":"ci/android_profile","platform":"android","save_out":false},
              {"config":"ci/android_profile_arm64","platform":"android","save_out":false},
              {"config":"ci/android_profile_x64","platform":"android","save_out":false},
              {"config":"ci/android_release","platform":"android","save_out":false},
              {"config":"ci/android_release_arm64","platform":"android","save_out":false},
              {"config":"ci/android_release_x64","platform":"android","save_out":false}
            ]'
          else
            linux='[]'
            mac='[
              {"config":"ci/ios_debug","platform":"ios","save_out":true},
              {"config":"ci/ios_debug_sim","platform":"ios","save_out":true},
              {"config":"ci/ios_debug_sim_arm64","platform":"ios","save_out":true}
            ]'
          fi
          echo "linux=$(echo $linux | tr -d '\n ')" >> "$GITHUB_OUTPUT"
          echo "mac=$(echo $mac | tr -d '\n ')" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: plan
    if: needs.plan.outputs.linux_matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.linux_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare flock
        uses: ./.github/actions/prepare-flock
        with:
          flutter_tag: ${{ github.event.inputs.flutter_tag }}
          platform: ${{ matrix.platform }}
          graphite_ref: ${{ github.event.inputs.graphite_ref }}
          apply_skia_patch: ${{ github.event.inputs.apply_skia_patch }}

      - name: Build ${{ matrix.config }}
        run: |
          chmod +x local-build-tools/build_engine.sh
          ./local-build-tools/build_engine.sh build --platform "${{ matrix.platform }}" --config "${{ matrix.config }}"

      - name: Publish outputs
        uses: ./.github/actions/publish-outputs
        with:
          config: ${{ matrix.config }}
          upload_gcs: ${{ github.event.inputs.upload_gcs }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_sa_key: ${{ secrets.GCP_SA_KEY }}

  build-mac:
    needs: plan
    if: needs.plan.outputs.mac_matrix != '[]'
    runs-on: macos-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.mac_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare flock
        uses: ./.github/actions/prepare-flock
        with:
          flutter_tag: ${{ github.event.inputs.flutter_tag }}
          platform: ${{ matrix.platform }}
          graphite_ref: ${{ github.event.inputs.graphite_ref }}
          apply_skia_patch: ${{ github.event.inputs.apply_skia_patch }}

      - name: Build ${{ matrix.config }}
        run: |
          chmod +x local-build-tools/build_engine.sh
          ./local-build-tools/build_engine.sh build --platform "${{ matrix.platform }}" --config "${{ matrix.config }}"

      - name: Sanitize config name
        if: always()
        run: echo "CONFIG_SAFE=$(echo '${{ matrix.config }}' | tr '/' '_')" >> "$GITHUB_ENV"

      # Framework assembly needs this config's raw out-dir on another runner.
      # tar preserves symlinks and exec bits that upload-artifact alone would drop.
      # obj/ (compile intermediates) is the bulk of an out-dir and is never
      # needed for packaging — excluding it keeps the frameworks runner's disk alive.
      - name: Save out-dir for frameworks job
        if: ${{ matrix.save_out }}
        run: |
          tar -C flock/engine/src -czf "outdir-${CONFIG_SAFE}.tgz" \
            --exclude='*/obj' --exclude='*/obj/*' \
            "out/${{ matrix.config }}"
          ls -lh "outdir-${CONFIG_SAFE}.tgz"

      - name: Upload out-dir
        if: ${{ matrix.save_out }}
        uses: actions/upload-artifact@v4
        with:
          name: outdir-${{ env.CONFIG_SAFE }}
          path: outdir-${{ env.CONFIG_SAFE }}.tgz
          retention-days: 3

      - name: Publish outputs
        uses: ./.github/actions/publish-outputs
        with:
          config: ${{ matrix.config }}
          upload_gcs: ${{ github.event.inputs.upload_gcs }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_sa_key: ${{ secrets.GCP_SA_KEY }}

  frameworks:
    needs: [plan, build-mac]
    if: >-
      ${{ !cancelled()
          && (needs.build-mac.result == 'success'
              || (github.event.inputs.frameworks_from_run != '' && needs.build-mac.result != 'failure')) }}
    runs-on: macos-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Framework packaging needs the synced checkout's toolchain
      # (buildtools/.../dsymutil for --dsym). Disk fits because the restored
      # out-dirs exclude obj/ intermediates (36 GB instead of ~80 GB).
      - name: Prepare flock
        uses: ./.github/actions/prepare-flock
        with:
          flutter_tag: ${{ github.event.inputs.flutter_tag }}
          platform: mac
          graphite_ref: ${{ github.event.inputs.graphite_ref }}
          apply_skia_patch: ${{ github.event.inputs.apply_skia_patch }}

      # Restore out-dirs one artifact at a time (download → extract → delete)
      # so the compressed tarballs never accumulate on disk. obj/ is excluded
      # again on extraction so artifacts from runs predating the slim tars
      # (recovery mode) also unpack lean.
      - name: Restore out-dirs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SRC_RUN="${{ github.event.inputs.frameworks_from_run }}"
          if [ -z "$SRC_RUN" ]; then SRC_RUN="${{ github.run_id }}"; fi
          restore_from_run() {
            local run_id="$1"
            echo "Restoring outdir artifacts from run $run_id"
            local names
            names=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts?per_page=100" \
              --paginate --jq '.artifacts[] | select(.name | startswith("outdir-")) | .name' | sort -u)
            for name in $names; do
              echo "=== $name (run $run_id)"
              gh run download "$run_id" --repo "$GITHUB_REPOSITORY" -n "$name" -D art-tmp
              tar -C flock/engine/src -xzf art-tmp/*.tgz --exclude='*/obj' --exclude='*/obj/*'
              rm -rf art-tmp
              df -h / | tail -1
            done
          }
          restore_from_run "$SRC_RUN"
          # In recovery mode with extra builds, this run's own artifacts overlay
          # the source run's.
          if [ "$SRC_RUN" != "${{ github.run_id }}" ]; then
            restore_from_run "${{ github.run_id }}"
          fi
          if [ ! -d flock/engine/src/out ]; then
            echo "No outdir artifacts restored"; exit 1
          fi
          echo "=== restored:"
          du -sh flock/engine/src/out/* 2>/dev/null || true

      - name: Create frameworks
        run: |
          chmod +x local-build-tools/build_engine.sh
          ./local-build-tools/build_engine.sh framework

      # build_engine_local.py swallows framework-creation errors (logged, not
      # fatal), so assert the expected outputs exist before anything publishes.
      - name: Assert expected framework artifacts
        run: |
          HASH=$(cat flock/bin/internal/engine.version)
          BASE="flock/engine/src/out/flutter_infra_release/flutter/$HASH"
          expected="ios/artifacts.zip"
          if [ "${{ github.event.inputs.scope }}" = "full" ] || [ -n "${{ github.event.inputs.frameworks_from_run }}" ]; then
            expected="
              ios/artifacts.zip
              ios-profile/artifacts.zip
              ios-release/artifacts.zip
              darwin-x64/FlutterMacOS.framework.zip
              darwin-x64/FlutterEmbedder.framework.zip
              darwin-x64/framework.zip
              darwin-x64/gen_snapshot.zip
              darwin-x64-profile/FlutterMacOS.framework.zip
              darwin-x64-profile/gen_snapshot.zip
              darwin-x64-release/FlutterMacOS.framework.zip
              darwin-x64-release/gen_snapshot.zip
            "
          fi
          missing=0
          for f in $expected; do
            if [ -f "$BASE/$f" ]; then echo "OK   $f"; else echo "MISSING $f"; missing=1; fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Framework assembly incomplete — failing before publish."
            exit 1
          fi

      - name: Verify Graphite in frameworks
        run: |
          found=0
          for bin in flock/engine/src/out/ios/Flutter.xcframework/ios-arm64/Flutter.framework/Flutter \
                     flock/engine/src/out/debug/framework/FlutterMacOS.framework/Versions/A/FlutterMacOS; do
            if [ -f "$bin" ]; then
              hits=$(strings -a "$bin" | grep -c graphite || true)
              echo "$bin: $hits graphite string(s)"
              if [ "${hits:-0}" -gt 0 ]; then found=1; fi
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "WARNING: no graphite strings found in framework binaries"
          fi

      - name: Publish outputs
        uses: ./.github/actions/publish-outputs
        with:
          config: frameworks
          upload_gcs: ${{ github.event.inputs.upload_gcs }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_sa_key: ${{ secrets.GCP_SA_KEY }}

  # Stock upstream artifacts that don't contain the engine renderer and can be
  # mirrored as-is from Google's bucket (same engine hash).
  backfill:
    if: ${{ github.event.inputs.scope == 'full' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve engine hash
        run: |
          git clone --depth=1 --branch "$FLUTTER_TAG" https://github.com/flutter/flutter.git flock-shallow
          echo "ENGINE_HASH=$(cat flock-shallow/bin/internal/engine.version)" >> "$GITHUB_ENV"

      - name: Download stock artifacts
        run: |
          INFRA="flutter_infra_release/flutter/$ENGINE_HASH"
          mkdir -p staging
          # NOTE: engine_stamp.json is intentionally absent — the flutter tool
          # treats its presence as "this release exists", so it is uploaded
          # last by the release job, only after every other job succeeded.
          targets=(
            "$INFRA/sky_engine.zip"
            "$INFRA/flutter_patched_sdk.zip"
            "$INFRA/flutter_patched_sdk_product.zip"
            "$INFRA/flutter_gpu.zip"
            "$INFRA/flutter-web-sdk.zip"
            "$INFRA/android-javadoc.zip"
            "$INFRA/android-x86/artifacts.zip"
            "$INFRA/android-x64/artifacts.zip"
            "$INFRA/dart-sdk-darwin-arm64.zip"
            "$INFRA/dart-sdk-darwin-x64.zip"
            "$INFRA/dart-sdk-linux-x64.zip"
            "$INFRA/dart-sdk-windows-x64.zip"
            "$INFRA/linux-x64/artifacts.zip"
            "$INFRA/linux-x64/font-subset.zip"
          )
          # Shared (hash-less) objects referenced via version files in the
          # flutter checkout. Re-mirroring them every release resets their age so
          # the bucket's lifecycle rule never deletes one still in use.
          INTERNAL=flock-shallow/bin/internal
          targets+=("$(cat $INTERNAL/material_fonts.version)")
          targets+=("$(cat $INTERNAL/gradle_wrapper.version)")
          for dep in ios-deploy libimobiledevice libimobiledeviceglue libplist libusbmuxd openssl; do
            ver=$(cat "$INTERNAL/$dep.version" 2>/dev/null || true)
            if [ -n "$ver" ]; then
              targets+=("flutter_infra_release/ios-usb-dependencies/$dep/$ver/$dep.zip")
            fi
          done

          for t in "${targets[@]}"; do
            mkdir -p "staging/$(dirname "$t")"
            echo "Fetching $t"
            curl -sfL --retry 3 -o "staging/$t" "https://storage.googleapis.com/$t" \
              || echo "WARNING: missing upstream $t"
          done
          find staging -type f | sed 's|^staging/||'

      - name: Publish outputs
        uses: ./.github/actions/publish-outputs
        with:
          config: backfill
          staging_dir: staging
          upload_gcs: ${{ github.event.inputs.upload_gcs }}
          gcp_bucket: ${{ github.event.inputs.gcp_bucket }}
          gcp_sa_key: ${{ secrets.GCP_SA_KEY }}

  # Atomic release marker: the flutter tool only considers an engine version
  # present once engine_stamp.json exists at its hash. Uploading it here —
  # gated on every build/framework/backfill job succeeding — means a partially
  # failed run is invisible to consumers and simply retries next time.
  release:
    needs: [build-linux, build-mac, frameworks, backfill]
    # Runs for a full build, or in recovery mode (frameworks_from_run) where the
    # build jobs were intentionally skipped because their outputs already shipped.
    if: >-
      ${{ !cancelled()
          && github.event.inputs.upload_gcs == 'true'
          && (github.event.inputs.scope == 'full' || github.event.inputs.frameworks_from_run != '')
          && needs.frameworks.result == 'success'
          && needs.build-linux.result != 'failure'
          && needs.build-mac.result != 'failure'
          && needs.backfill.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve engine hash
        run: |
          git clone --depth=1 --branch "$FLUTTER_TAG" https://github.com/flutter/flutter.git flock-shallow
          echo "ENGINE_HASH=$(cat flock-shallow/bin/internal/engine.version)" >> "$GITHUB_ENV"

      - name: Fetch stock engine_stamp.json
        run: |
          curl -sfL --retry 3 -o engine_stamp.json \
            "https://storage.googleapis.com/flutter_infra_release/flutter/$ENGINE_HASH/engine_stamp.json"
          cat engine_stamp.json

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Publish release stamp
        run: |
          gcloud storage cp engine_stamp.json \
            "gs://${{ github.event.inputs.gcp_bucket }}/flutter_infra_release/flutter/$ENGINE_HASH/engine_stamp.json"
          echo "Release $FLUTTER_TAG ($ENGINE_HASH) is now live."
